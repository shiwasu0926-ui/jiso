<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>キャラクター</title>

<meta name="robots" content="noindex, nofollow">

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f0f0f0;
}

.container {
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 20px;
}

.card-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 30px;
}

.card {
  display: flex;
  align-items: center;
  gap: 12px;

  text-decoration: none;
  color: inherit;

  background: #f5f5f5;
  border-radius: 12px;
  padding: 12px;

  transition: 0.2s;
}

.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.icon {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  flex-shrink: 0;
}

.text h3 {
  margin: 0;
  font-size: 16px;
}

.text p {
  margin: 4px 0 0;
  font-size: 13px;
  color: #555;
}


@media (max-width: 480px) {
  .icon {
    width: 44px;
    height: 44px;
  }

  .text h3 {
    font-size: 15px;
  }

  .text p {
    font-size: 12px;
  }
}

  
</style>


  
</head>

<body>
<div class="container">
  <a href="index.html">トップへ</a> ＞

  <h1>キャラクター一覧</h1>
  <p>自創作キャラクターいっきみ用</p>

<hr>

<h2>エンドロールは笑顔とともに</h2>
<div class="card-list">

  <a href="char1.html" class="card">
    <img src="Syou.jpg" class="icon">
    <div class="text">
      <h3>ショー</h3>
      <p>元プロマジシャン。愛煙家</p>
    </div>
  </a>

</div>
 <h2>天晴れ！学校征服定例会議！</h2>
<div class="card-list">

  <a href="hrn.html" class="card">
    <img src="hrn2.jpeg" class="icon">
    <div class="text">
      <h3>天國晴哉</h3>
      <p>生徒会長。破天荒でドジ</p>
    </div>
  </a>

</div>
  
<h2>サントゥテラ創作</h2>
<div class="card-list">

  <a href="sitera.html" class="card">
    <img src="Syou.png" class="icon">
    <div class="text">
      <h3>シテラ</h3>
      <p>フルールトップ。身勝手で性悪</p>
    </div>
  </a>

</div>

</body>
</html>
