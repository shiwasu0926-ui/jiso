<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雅楽代花奏</title>

<meta name="robots" content="noindex, nofollow">

<style>
body {
  margin: 0;
  font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
  background: #f0f0f0;
  color: #222;
}

.container {
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 30px;
  overflow-x: hidden; 
}

h1 {
  margin-bottom: 10px;
  border-bottom: 1px solid #ddd;
  padding-bottom: 8px;
}

h2 {
  margin: 10px 0 15px;
  font-weight: normal;
  color: #555;
}

p {
  line-height: 1.8;
  margin-bottom: 14px;
}


.gallery {
  display: flex;
  gap: 15px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  padding: 10px 0;
}

.gallery img {
  flex: 0 0 70%;
  max-width: 300px;
  height: 300px;
  object-fit: cover;
  border-radius: 10px;
  scroll-snap-align: center;
  cursor: pointer;
}


.gallery::-webkit-scrollbar {
  display: none;
}


#modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
  z-index: 999;
}

#modal img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
}

.box {
  border: 1px solid #e5e5e5;
  padding: 20px;
  margin-top: 30px;
  background: #fafafa;
  border-radius: 8px;
}

.box p {
  margin-bottom: 18px;
}

a {
  color: blue;
}

.profile {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px 20px;
}

.profile p {
  margin: 0;
  padding: 6px 0;
  border-bottom: 1px solid #eee;
}

@media (min-width: 768px) {
  .profile {
    grid-template-columns: 1fr 1fr;
    gap: 12px 40px;
  }
}
</style>


</head>

<body>
<div class="container">

  <a href="index.html">トップ</a> ＞


  <h1>雅楽代花奏（うたしろはなか）</h1>

  <div class="gallery">
    <img src="hanaka1.jpg"onclick="openModal(this)">

  </div>

  <h2>「彼はね、私の曲の中でもこれを一番よく聞いてくれたのよ。」</h2>

  <p>不慮の事故で視力と恋人を失ったピアニスト。以前誰デザ用で制作したキャラクター。</p>

  <div class="box">
    <div class="profile">
      <p>性別：女</p>
      <p>年齢：25</p>
      <p>身長：167.2cm</p>
      <p>体重：57.6kg</p>
      <p>一人称：私</p>
      <p>二人称：貴方、（名前）さん</p>
      <p>好きなもの：バームクーヘン、ピアノ</p>
      <p>嫌いなもの：ナマコ、音のない空間</p>
      <p>趣味：楽譜集め</p>
      <p>特技：編み物</p>
      <p>苦手：雨の日</p>
      <p>誕生日：7月6日</p>
      <p>血液型：A型</p>
      <p>利き手：両手</p>
      <p>役職：ピアニスト</p>

    </div>
  </div>

  <div id="modal" onclick="closeModal()">
  <img id="modalImg">
</div>

<script>
function openModal(img) {
  const modal = document.getElementById("modal");
  const modalImg = document.getElementById("modalImg");

  modal.style.display = "flex";
  modalImg.src = img.src;
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}
</script>


</body>
</html>
