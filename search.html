<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search</title>

<style>
body {
  font-family: sans-serif;
  margin: 20px;
}

/* 検索欄 */
input {
  width: 100%;
  padding: 10px;
  margin-bottom: 15px;
}

/* ボタン */
button {
  margin-right: 5px;
  padding: 8px 12px;
}

/* 結果 */
.item {
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>Search</h1>

<input type="text" id="search" placeholder="タイトル / タグ / キーワード">

<div>
  <button onclick="filter('all')">All</button>
  <button onclick="filter('char')">Characters</button>
  <button onclick="filter('work')">Works</button>
  <button onclick="filter('ss')">SS</button>
</div>

<div id="results">

  <div class="item" data-type="ss">ウィズ・インタビュー SS</div>
  <div class="item" data-type="ss">SS十二股世界線</div>
  <div class="item" data-type="char">キャラ①</div>

</div>

<script>
const search = document.getElementById("search");
const items = document.querySelectorAll(".item");

search.addEventListener("keyup", () => {
  const keyword = search.value.toLowerCase();

  items.forEach(item => {
    const text = item.textContent.toLowerCase();

    item.style.display = text.includes(keyword) ? "block" : "none";
  });
});

function filter(type) {
  items.forEach(item => {
    if (type === "all") {
      item.style.display = "block";
    } else {
      item.style.display = item.dataset.type === type ? "block" : "none";
    }
  });
}
</script>

</body>
</html>
